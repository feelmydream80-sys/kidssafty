<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동작구 어린이 안전 데이터 통합 지도</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0;padding:0;font-family:'Malgun Gothic',sans-serif; }
        #container { display:flex;height:100vh; }
        #header { background:linear-gradient(135deg,#e74c3c,#c0392b);color:white;padding:10px 16px;display:flex;justify-content:space-between;align-items:center; }
        #header h1 { margin:0;font-size:16px; }
        .btn { padding:6px 10px;border:none;border-radius:6px;font-size:12px;cursor:pointer;background:rgba(255,255,255,0.9);color:#333; }
        #sidebar { width:35%;overflow-y:auto;padding:10px;background:#f5f5f5; }
        #map { width:65%; }
        h2 { margin-top:0;color:#2c3e50;border-bottom:2px solid #3498db;padding-bottom:5px;font-size:14px; }
        table { width:100%;border-collapse:collapse;margin-bottom:20px; }
        th,td { padding:6px 4px;text-align:left;border-bottom:1px solid #ddd;font-size:0.85em; }
        th { background-color:#3498db;color:white; }
        tr:hover { background-color:#f5f5f5; }
        .legend { background:white;padding:10px;border-radius:5px;box-shadow:0 0 15px rgba(0,0,0,0.2);line-height:1.5;font-size:12px; }
        .grade-A { background-color:#27ae60;color:white; } .grade-B { background-color:#2ecc71;color:white; }
        .grade-C { background-color:#f1c40f;color:black; } .grade-D { background-color:#e67e22;color:white; }
        .grade-F { background-color:#e74c3c;color:white; }
        .safety-marker { border-radius:50%;width:28px;height:28px;text-align:center;line-height:28px;font-weight:bold;font-size:0.9em; }
        .safety-marker-dynamic { background:transparent !important;border:none !important; }
    </style>
</head>
<body>
    <div>
        <div id="header">
            <h1>동작구 어린이 안전 통합 지도</h1>
            <div><button id="btn-settings" class="btn">⚙️ 설정</button></div>
        </div>
        <div id="container">
            <div id="sidebar">
                <h2>동작구 학교/유치원 (113개)</h2>
                <table id="school-table"><thead><tr><th>이름</th><th>유형</th><th>주소</th></tr></thead><tbody id="school-tbody"></tbody></table>
                <h2>사고 다발 지역 (135개)</h2>
                <table id="accident-table"><thead><tr><th>지점명</th><th>사고건수</th><th>사상자수</th></tr></thead><tbody id="accident-tbody"></tbody></table>
            </div>
            <div id="map"></div>
        </div>
        <div id="mission-panel" style="display:none;position:fixed;top:70px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#667eea,#764ba2);border-radius:12px;padding:16px;z-index:1002;box-shadow:0 4px 20px rgba(0,0,0,0.3);color:white;width:280px;">
            <div class="mission-header" style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
                <span style="font-size:20px;">🎯</span>
                <span style="font-size:14px;font-weight:600;">미션 <span id="mission-current">1</span>/4</span>
            </div>
            <div id="mission-text" style="font-size:16px;font-weight:600;text-align:center;margin-bottom:8px;"></div>
            <div id="mission-instruction" style="font-size:24px;text-align:center;margin:10px 0;"></div>
            <div style="background:rgba(255,255,255,0.2);border-radius:8px;height:6px;margin-top:10px;">
                <div class="progress-bar" id="mission-progress" style="height:100%;background:#4ade80;border-radius:8px;transition:width 0.3s;"></div>
            </div>
            <div id="mission-status" style="text-align:center;font-size:12px;margin-top:6px;opacity:0.9;">미션을 수행해주세요!</div>
            <button id="mission-skip" style="margin-top:8px;width:100%;background:rgba(255,255,255,0.3);border:1px solid rgba(255,255,255,0.5);color:white;padding:6px;border-radius:6px;cursor:pointer;font-size:12px;">▶ 데스크톱: 스킵 (Enter)</button>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script>
    // ========== 설정 ==========
    const DEFAULT_ICONS = {
        school_elem:{icon:'S',color:'#27ae60',visible:true},
        school_middle:{icon:'M',color:'#2980b9',visible:true},
        school_high:{icon:'H',color:'#8e44ad',visible:true},
        kindergarten:{icon:'K',color:'#f39c12',visible:true},
        childcare:{icon:'C',color:'#e67e22',visible:true},
        academy:{icon:'A',color:'#95a5a6',visible:true},
        special_school:{icon:'*',color:'#e74c3c',visible:true},
        protection_zone:{icon:'\u25CF',color:'#9b59b6',visible:true},
        crosswalk:{icon:'\u00B7',color:'#bdc3c7',visible:true},
        accident_zone:{icon:'\u26A0',color:'#e74c3c',visible:true}
    };
    function loadIconConfig() {
        try {
            const saved = localStorage.getItem('kidsSafeIcons');
            if (saved) {
                const parsed = JSON.parse(saved);
                const cfg = {};
                for (const k of Object.keys(DEFAULT_ICONS)) {
                    cfg[k] = {...DEFAULT_ICONS[k], ...(parsed[k] || {})};
                }
                return cfg;
            }
        } catch(e) {}
        return {...DEFAULT_ICONS};
    }
    let ICONS = loadIconConfig();

    const SUBCAT_KEY = {
        '초등학교':'school_elem','중학교':'school_middle','고등학교':'school_high',
        '유치원(일반)':'kindergarten','유치원(병설)':'kindergarten','유치원':'kindergarten',
        '어린이집':'childcare','학원':'academy','특수학교':'special_school'
    };
    function iconCfg(cat, sub) {
        const k = cat==='accident_zone'?'accident_zone':cat==='protection_zone'?'protection_zone':cat==='crosswalk'?'crosswalk':SUBCAT_KEY[sub]||'school_elem';
        return ICONS[k]||ICONS.school_elem;
    }

    // ========== 지도 ==========
    const map = L.map('map').setView([37.502,126.94],13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap'}).addTo(map);

    fetch('data/locations.json').then(r=>r.json()).then(d=>{
        const items = d.items||[];
        initMap(items); fillTables(items); loadGrades(); loadDensity();
    }).catch(e=>console.error('데이터 로드 실패:',e));

    function initMap(items) {
        // 학교
        const sc = ['school','kindergarten','childcare','academy','special_school'];
        items.filter(x=>sc.includes(x.category)&&x.lat&&x.lng).forEach(s=>{
            const c = iconCfg(s.category,s.subcategory);
            if(c.visible===false)return;
            L.marker([s.lat,s.lng],{
                icon:L.divIcon({className:'safety-marker-dynamic',
                    html:'<div style="width:24px;height:24px;border-radius:50%;background:'+c.color+';color:#fff;text-align:center;line-height:24px;font-weight:bold;font-size:11px;">'+c.icon+'</div>',
                    iconSize:[24,24]})
            }).addTo(map).bindPopup('<b>'+s.name+'</b><br>'+s.subcategory+'<br>'+s.address);
        });
        // 사고
        const ac = iconCfg('accident_zone');
        if(ac.visible!==false){
            items.filter(x=>x.category==='accident_zone'&&x.lat&&x.lng).forEach(a=>{
                const p=a.properties||{};
                L.marker([a.lat,a.lng],{
                    icon:L.divIcon({className:'safety-marker-dynamic',
                        html:'<div style="width:26px;height:26px;border-radius:50%;background:'+ac.color+';color:#fff;text-align:center;line-height:26px;font-weight:bold;font-size:13px;">'+ac.icon+'</div>',
                        iconSize:[26,26]})
                }).addTo(map).bindPopup('<b>'+a.name+'</b><br>사고 '+p.accident_count+'건, 사상 '+p.casualties+'명');
            });
        }
        // 보호구역
        const pz = iconCfg('protection_zone');
        if(pz.visible!==false){
            items.filter(x=>x.category==='protection_zone'&&x.lat&&x.lng).forEach(z=>{
                const p=z.properties||{};
                L.circle([z.lat,z.lng],{color:pz.color,fillColor:pz.color,fillOpacity:0.12,radius:50,weight:2})
                    .addTo(map).bindPopup('<b>'+z.name+'</b><br>유형:'+z.subcategory+'<br> CCTV:'+(p.cctv_count||'N/A')+'대');
                if(p.cctv_yn==='Y'||(p.cctv_count||0)>0){
                    L.circleMarker([z.lat,z.lng],{radius:5,color:pz.color,fillColor:'#fff',fillOpacity:0.9,weight:2}).addTo(map);
                }
            });
        }
        // 범례
        const legend = L.control({position:'bottomright'});
        legend.onAdd=function(){
            const d=L.DomUtil.create('div','legend');
            d.innerHTML='<b>범례</b><br><span style="color:#27ae60;">S</span> 초등학교<br><span style="color:#2980b9;">M</span> 중학교<br><span style="color:#8e44ad;">H</span> 고등학교<br><span style="color:#f39c12;">K</span> 유치원<br><span style="color:#e67e22;">C</span> 어린이집<br><span style="color:#9b59b6;">\u25CF</span> 보호구역(CCTV)<br><span style="color:#e74c3c;">\u26A0</span> 사고다발지역<hr style="margin:5px 0;"><b>안전등급</b><br><span style="color:#27ae60;">\u25CF</span> A <span style="color:#2ecc71;">\u25CF</span> B <span style="color:#f1c40f;">\u25CF</span> C <span style="color:#e67e22;">\u25CF</span> D <span style="color:#e74c3c;">\u25CF</span> F';
            return d;
        };
        legend.addTo(map);
    }

    function loadGrades(){
        fetch('data/analysis/school_safety_grades.json').then(r=>r.json()).then(d=>{
            (d.safety_grades||[]).forEach(item=>{
                L.marker([item.lat,item.lng],{
                    icon:L.divIcon({className:'safety-marker grade-'+item.safety_grade,html:item.safety_grade,iconSize:[28,28]})
                }).addTo(map).bindPopup('<b>'+item.school_name+'</b><br>안전등급: <b>'+item.safety_grade+'</b><br>횡단보도: '+item.crosswalk_count+'개');
            });
        }).catch(()=>{});
    }

    function loadDensity(){
        fetch('data/analysis/risk_density_grid.json').then(r=>r.json()).then(d=>{
            const hp = (d.grid||[]).filter(p=>p.density>=0.4).map(p=>[p.lat,p.lng,p.density]);
            if(typeof L.heatLayer!=='undefined'&&hp.length>0){
                L.heatLayer(hp,{radius:20,blur:15,maxZoom:17,gradient:{0.4:'blue',0.6:'yellow',0.8:'orange',1.0:'red'}}).addTo(map);
            }
        }).catch(()=>{});
    }

    function fillTables(items){
        const schools = items.filter(x=>['school','kindergarten','childcare','academy','special_school'].includes(x.category)&&x.lat&&x.lng);
        document.getElementById('school-tbody').innerHTML = schools.map(s=>'<tr><td>'+s.name+'</td><td>'+s.subcategory+'</td><td>'+(s.address||'').substring(0,30)+'</td></tr>').join('');
        const acc = items.filter(x=>x.category==='accident_zone'&&x.lat&&x.lng);
        document.getElementById('accident-tbody').innerHTML = acc.map(a=>{
            const p=a.properties||{};
            return '<tr><td>'+(a.name||'').replace(/^서울특별시\s*/,'').replace(/^동작구\s*/,'')+'</td><td>'+(p.accident_count||0)+'</td><td>'+(p.casualties||0)+'</td></tr>';
        }).join('');
    }

    // ========== 설정 패널 ==========
    const ICON_SET = ['S','M','H','K','C','A','T','W','P','B','*','\u25CF','\u25B2','\u25A0','\u25C6','\u2665','\u2726','\u26A0','\u2600','\u267B'];
    const COLORS = ['#e74c3c','#e91e63','#9b59b6','#673ab7','#3f51b5','#2196f3','#00bcd4','#009688','#4caf50','#8bc34a','#ffeb3b','#ff9800','#ff5722','#795548','#9e9e9e','#2c3e50'];
    const LABELS = {school_elem:'초등학교',school_middle:'중학교',school_high:'고등학교',kindergarten:'유치원',childcare:'어린이집',academy:'학원',special_school:'특수학교',protection_zone:'어린이보호구역',crosswalk:'횡단보도',accident_zone:'사고다발지역'};

    let picker = null;
    document.getElementById('btn-settings').onclick = openPanel;

    function openPanel(){
        closePanel();
        const ov = document.createElement('div');
        ov.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;z-index:2000;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;';
        ov.onclick=function(e){if(e.target===ov)closePanel();};

        const box = document.createElement('div');
        box.style.cssText='background:white;border-radius:12px;width:400px;max-height:90vh;overflow-y:auto;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.3);';

        let rows='';
        for(const[k,l]of Object.entries(LABELS)){
            const c=ICONS[k]||DEFAULT_ICONS.school_elem;
            rows+='<tr data-k="'+k+'"><td><input type="checkbox" class="vcb" '+(c.visible!==false?'checked':'')+'></td><td>'+l+'</td><td><span class="ipre" style="background:'+c.color+';color:#fff;border-radius:50%;display:inline-block;width:28px;height:28px;text-align:center;line-height:28px;font-weight:bold;font-size:13px;cursor:pointer;">'+c.icon+'</span></td><td><span class="cdot" style="background:'+c.color+';border:2px solid #ddd;border-radius:50%;display:inline-block;width:22px;height:22px;cursor:pointer;"></span></td></tr>';
        }

        box.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;"><h2 style="margin:0;font-size:18px;color:#2c3e50;">\u2699\uFE0F 지도 설정</h2><button id="sc" style="background:none;border:none;font-size:22px;cursor:pointer;color:#999;">&times;</button></div>'
            +'<table style="width:100%;border-collapse:collapse;font-size:13px;"><thead><tr style="border-bottom:2px solid #3498db;"><th style="width:30px;padding:6px;">표시</th><th style="text-align:left;padding:6px;">카테고리</th><th style="width:60px;padding:6px;">아이콘</th><th style="width:50px;padding:6px;">색상</th></tr></thead><tbody>'+rows+'</tbody></table>'
            +'<div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end;"><button id="sreset" style="background:#95a5a6;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;">\uD83D\uDD04 기본값</button><button id="sapply" style="background:#3498db;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;">\u2705 적용</button></div>';

        ov.appendChild(box);
        document.body.appendChild(ov);

        // 바인딩
        document.getElementById('sc').onclick=closePanel;
        document.getElementById('sapply').onclick=function(){applyPanel();};
        document.getElementById('sreset').onclick=function(){localStorage.removeItem('kidsSafeIcons');closePanel();location.reload();};

        box.querySelectorAll('.ipre').forEach(el=>{
            el.onclick=function(e){e.stopPropagation();showIconPicker(el);};
        });
        box.querySelectorAll('.cdot').forEach(el=>{
            el.onclick=function(e){e.stopPropagation();showColorPicker(el);};
        });
    }

    function showIconPicker(target){
        closePicker();
        const r = target.getBoundingClientRect();
        const p = document.createElement('div');
        p.style.cssText='position:fixed;top:'+(r.bottom+4)+'px;left:'+r.left+'px;background:white;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.2);padding:8px;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;z-index:3000;';
        ICON_SET.forEach(ic=>{
            const b = document.createElement('button');
            b.textContent=ic;
            const bg = window.getComputedStyle(target).backgroundColor;
            b.style.cssText='width:36px;height:36px;border-radius:50%;border:2px solid transparent;background:'+bg+';color:#fff;font-weight:bold;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;';
            b.onclick=function(){target.textContent=ic;closePicker();};
            p.appendChild(b);
        });
        document.body.appendChild(p);
        picker=p;
        setTimeout(()=>document.addEventListener('click',closePicker,{once:true}),0);
    }

    function showColorPicker(target){
        closePicker();
        const r = target.getBoundingClientRect();
        const p = document.createElement('div');
        p.style.cssText='position:fixed;top:'+(r.bottom+4)+'px;left:'+r.left+'px;background:white;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.2);padding:8px;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;z-index:3000;';
        COLORS.forEach(c=>{
            const b = document.createElement('button');
            b.style.cssText='width:32px;height:32px;border-radius:50%;border:2px solid #ddd;background:'+c+';cursor:pointer;';
            b.onclick=function(){
                target.style.background=c;
                const tr=target.closest('tr');
                const ip=tr&&tr.querySelector('.ipre');
                if(ip)ip.style.background=c;
                closePicker();
            };
            p.appendChild(b);
        });
        document.body.appendChild(p);
        picker=p;
        setTimeout(()=>document.addEventListener('click',closePicker,{once:true}),0);
    }

    function closePicker(){if(picker){picker.remove();picker=null;}}
    function closePanel(){const e=document.querySelector('#settings-panel-modal');if(e)e.remove();closePicker();}

    function applyPanel(){
        const cfg={};
        document.querySelectorAll('tr[data-k]').forEach(tr=>{
            const k=tr.dataset.k;
            const cb=tr.querySelector('.vcb');
            const ip=tr.querySelector('.ipre');
            const cd=tr.querySelector('.cdot');
            cfg[k]={visible:cb.checked,icon:ip.textContent,color:cd.style.background||'#999'};
        });
        localStorage.setItem('kidsSafeIcons',JSON.stringify(cfg));
        closePanel();
        location.reload();
    }

    // === 미션 시스템 (combined.html 내장) ===
    const MISSIONS = [
        {id:1,text:'🟢 초록불이 켜졌어요!',instruction:'📱 흔들어줘',type:'shake'},
        {id:2,text:'👀 좌우를 살펴봐!',instruction:'📱 흔들어줘',type:'shake'},
        {id:3,text:'👁️ 좌우 회전하며 살피기',instruction:'🔄 회전해줘',type:'rotate'},
        {id:4,text:'✅ 다 건넜어!',instruction:'📱 흔들어줘',type:'shake'}
    ];
    let ms = {active:false,idx:0,detecting:false};
    let lastG=0;

    window.startMission=function(){
        if(ms.active)return;
        if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
            DeviceMotionEvent.requestPermission().catch(()=>{});
        }
        ms.active=true;ms.idx=0;ms.detecting=true;
        const p=document.getElementById('mission-panel');
        if(p)p.style.display='block';
        updateMsUI();
        window.addEventListener('devicemotion',msShake);
        window.addEventListener('deviceorientation',msRotate);
    };
    function updateMsUI(){
        if(!ms.active)return;
        const m=MISSIONS[ms.idx];
        if(!m){completeMs();return;}
        document.getElementById('mission-current').textContent=m.id;
        document.getElementById('mission-text').textContent=m.text;
        document.getElementById('mission-instruction').textContent=m.instruction;
        document.getElementById('mission-progress').style.width=((ms.idx+1)/MISSIONS.length*100)+'%';
        document.getElementById('mission-status').textContent='미션을 수행해주세요!';
    }
    function completeMs(){
        ms.active=false;ms.detecting=false;
        const p=document.getElementById('mission-panel');
        if(p)p.style.display='none';
        window.removeEventListener('devicemotion',msShake);
        window.removeEventListener('deviceorientation',msRotate);
        if('vibrate'in navigator)navigator.vibrate([500,200,500]);
    }
    function msNext(){
        ms.idx++;
        if(ms.idx>=MISSIONS.length){completeMs();return;}
        const s=document.getElementById('mission-status');
        if(s)s.textContent='잘했어요! 🎉';
        setTimeout(updateMsUI,1500);
    }
    function msShake(e){
        if(!ms.active||!ms.detecting)return;
        const m=MISSIONS[ms.idx];
        if(!m||m.type!=='shake')return;
        let ax=e.acceleration?.x;
        if(ax===null||ax===undefined)ax=e.accelerationIncludingGravity?.x||0;
        if(Math.abs(ax)>15)msNext();
    }
    function msRotate(e){
        if(!ms.active||!ms.detecting)return;
        const m=MISSIONS[ms.idx];
        if(!m||m.type!=='rotate')return;
        const g=e.gamma||0;
        if(lastG!==0&&Math.abs(g-lastG)>20)msNext();
        lastG=g;
    }
    document.addEventListener('keydown',function(e){
        if(!ms.active)return;
        if(e.key==='Enter'||e.key===' '){msNext();}
    });
    document.getElementById('mission-skip').addEventListener('click',function(){
        if(ms.active)msNext();
    });
    </script>
</body>
</html>
